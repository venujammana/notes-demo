swagger: '2.0'
info:
  title: Notes API
  description: API for the Notes application
  version: 1.0.0
schemes:
  - https
produces:
  - application/json
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      x-google-backend:
        address: https://NOTES_APP_PROD_URL
        protocol: h2
      responses:
        '200':
          description: A successful response
          schema:
            type: string
  /notes:
    get:
      summary: Get all notes
      operationId: get_notes
      x-google-backend:
        address: https://notes-app-prod-xxxx-uc.a.run.app/notes
        protocol: h2
      responses:
        '200':
          description: A successful response
          schema:
            type: string
    post:
      summary: Create a new note
      operationId: create_note
      x-google-backend:
        address: https://notes-app-prod-xxxx-uc.a.run.app/notes
        protocol: h2
      responses:
        '201':
          description: A successful response
          schema:
            type: string
